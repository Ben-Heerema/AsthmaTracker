<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
  <title>My Asthma Tracker</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/child.css">
  <style>
    /* Make the child home page fill the viewport so buttons scale */
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .child-nav-grid {
      padding-bottom: clamp(12px, 2vh, 24px); /* grid handles its own padding */
    }
    .nav-bar {
      bottom: 28px; /* already set globally, reinforced here */
    }
    .medical-disclaimer {
      z-index: 250;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <!-- Welcome Header (teal gradient) -->
  <div class="child-welcome">
    <h1>Hi, <span id="child-name">there</span>! 👋</h1>
    <p>What would you like to do today?</p>
  </div>

  <!-- 4 large square navigation buttons -->
  <div class="child-nav-grid" id="main-content" tabindex="-1">
    <button type="button" class="child-nav-btn btn-inhaler" id="nav-inhaler" aria-label="Inhaler Technique">
      <span class="btn-icon" aria-hidden="true">💨</span>
      Inhaler Technique
    </button>
    <button type="button" class="child-nav-btn btn-medication" id="nav-medication" aria-label="Take Medication">
      <span class="btn-icon" aria-hidden="true">💊</span>
      Take Medication
    </button>
    <button type="button" class="child-nav-btn btn-badges" id="nav-badges" aria-label="My Badges">
      <span class="btn-icon" aria-hidden="true">🏅</span>
      My Badges
    </button>
    <button type="button" class="child-nav-btn btn-zone" id="nav-zone" aria-label="Check My Zone">
      <span class="btn-icon" aria-hidden="true">🌡️</span>
      Check My Zone
    </button>
  </div>

  <div class="medical-disclaimer">
    This app does not provide medical advice. Always consult a qualified healthcare professional for medical guidance.
  </div>

  <!-- Bottom nav bar: Home | 🚨 Emergency | Settings -->
  <nav class="nav-bar">
    <button type="button" class="nav-bar-item active" id="nav-home" aria-current="page">
      <span aria-hidden="true">🏠</span><span>Home</span>
    </button>
    <button type="button" class="nav-bar-item nav-bar-emergency" id="nav-emergency">
      <span aria-hidden="true">🚨</span><span>Emergency</span>
    </button>
    <button type="button" class="nav-bar-item" id="nav-settings">
      <span aria-hidden="true">⚙️</span><span>Settings</span>
    </button>
  </nav>

  <script src="../shared/toast.js" defer></script>
  <script src="../shared/session-guard.js" defer></script>
  <script src="main.js" defer></script>
</body>
</html>
