<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
  <title>Incident Logs</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/incident-logs.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="page-header">
    <button type="button" class="header-back" id="back-btn" aria-label="Go back">&#8592;</button>
    <h1>Incident Logs</h1>
    <div></div>
  </div>
  <div class="il-page" id="main-content" tabindex="-1">
    <div class="il-card">
      <div class="il-card-header">
        <span class="il-card-title"><span aria-hidden="true">🚨</span> Emergency Triage History</span>
        <span class="il-card-sub">All incidents</span>
      </div>
      <!-- Filter bar -->
      <div class="il-filter-bar">
        <div class="il-filter-field">
          <label for="filter-child" class="il-filter-label">Child</label>
          <select id="filter-child" class="il-filter-input">
            <option value="">All Children</option>
          </select>
        </div>
        <div class="il-filter-field">
          <label for="filter-week" class="il-filter-label">Week of</label>
          <input type="date" id="filter-week" class="il-filter-input">
        </div>
        <button type="button" class="il-filter-clear hidden" id="clear-filters-btn">Clear filters</button>
      </div>

      <div id="filter-summary" class="il-filter-summary hidden" aria-live="polite"></div>

      <div class="il-card-body">
        <div id="incident-list"><div class="spinner"></div></div>

        <div id="pagination-controls" class="page-controls hidden" aria-label="Pagination" aria-live="polite"></div>
      </div>
    </div>
  </div>

  <!-- ── Event log modal (shared by all incidents) ── -->
  <div id="log-modal-overlay" class="log-modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="log-modal-title">
    <div class="log-modal">
      <div class="log-modal-header">
        <div>
          <div class="log-modal-title" id="log-modal-title">📋 Event Log</div>
          <div class="log-modal-subtitle" id="log-modal-subtitle"></div>
        </div>
        <button class="log-modal-close" id="log-modal-close" type="button" aria-label="Close">✕</button>
      </div>
      <div class="log-modal-body">
        <pre id="log-modal-content" class="log-modal-pre"></pre>
      </div>
    </div>
  </div>

  <div class="medical-disclaimer">
    This app does not provide medical advice. Always consult a qualified healthcare professional for medical guidance.
  </div>

  <script src="../shared/toast.js" defer></script>
  <script src="../shared/session-guard.js" defer></script>
  <script src="incident-logs.js" defer></script>
</body>
</html>
